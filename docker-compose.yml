services:
  app:
    build: .
    ports:
      - "3000:3000"
    # Use a production env file for runtime secrets. Copy `.env.production.example` -> `.env.production`
    # and fill values before running in production.
    env_file: .env.production.example
    environment:
      - NODE_ENV=production
    # Uncomment for development mode
    # environment:
    #   - NODE_ENV=development
    # command: bun run dev
    # volumes:
    #   - .:/app
    #   - /app/node_modules
